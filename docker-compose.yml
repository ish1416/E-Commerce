version: "3.9"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: Dps@220068
      MYSQL_DATABASE: shopsmart
      MYSQL_USER: shopsmart
      MYSQL_PASSWORD: shopsmart123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pDps@220068"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: mysql://shopsmart:shopsmart123@mysql:3306/shopsmart
      JWT_SECRET: ${JWT_SECRET:-shopsmart-prod-secret-2026}
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://54.234.218.48:4000/graphql
      NEXTAUTH_URL: http://54.234.218.48:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-shopsmart-nextauth-secret-2026}
    depends_on:
      - backend

volumes:
  mysql_data:
